name: CI

on:
  push:
    branches: [dev, main, tests]
  pull_request:
    branches: [dev, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_ENV: test
  PHP_VERSION: "8.4"
  NODE_VERSION: 22

jobs:

  # ─── SETUP ───────────────

  setup:
    name: "Install dependencies"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: amqp, intl, pdo_pgsql
          tools: composer:v2, php-cs-fixer

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Cache assets vendor (importmap)
        uses: actions/cache@v4
        with:
          path: assets/vendor
          key: assets-vendor-${{ hashFiles('composer.lock') }}-${{ hashFiles('package-lock.json') }}
          restore-keys: assets-vendor-

      - run: cp .env.test .env
      - run: composer install --no-progress --no-interaction --no-scripts
      - run: npm ci
      - run: php bin/console importmap:install

  # ─── QUALITY ──────────────

  lint-php:
    name: "PHP Quality (CS-Fixer + PHPStan)"
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: amqp, intl, pdo_pgsql
          tools: composer:v2, php-cs-fixer

      - name: Restore Composer cache
        uses: actions/cache/restore@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - run: cp .env.test .env
      - run: composer install --no-progress --no-interaction --no-scripts
      - run: chmod +x vendor/bin/*

      - run: composer run cs-check
      - run: composer run phpstan

  lint-js:
    name: "JS Quality (ESLint)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci
      - run: npm run lint

  lint-twig:
    name: "Twig & YAML Lint"
    needs: [setup]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: amqp, intl, pdo_pgsql

      - name: Restore Composer cache
        uses: actions/cache/restore@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - run: cp .env.test .env
      - run: composer install --no-progress --no-interaction --no-scripts
      - run: php bin/console lint:twig templates/
      - run: php bin/console lint:yaml config/
      - run: php bin/console lint:container

  # ── POINT 1 : Lint MCP Python ──────────────────────────────────────────

  lint-mcp:
    name: "MCP Server (Python lint)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MCP dependencies
        run: pip install -r mcp-server/requirements.txt

      - name: Vérification syntaxe Python
        run: python -m py_compile mcp-server/main.py

  # ─── TESTS ───────────────────────

  unit-tests:
    name: "Tests unitaires"
    needs: [lint-php, lint-js, lint-twig]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: amqp, intl, pdo_pgsql

      - name: Restore Composer cache
        uses: actions/cache/restore@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - run: cp .env.test .env
      - run: composer install --no-progress --no-interaction --no-scripts
      - run: composer run phpunit:unit

  functional-tests:
    name: "Tests fonctionnels"
    needs: [lint-php, lint-js, lint-twig]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: carte_blanche
          POSTGRES_PASSWORD: carte_blanche
          POSTGRES_DB: carte_blanche_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: amqp, intl, pdo_pgsql

      - name: Restore Composer cache
        uses: actions/cache/restore@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Restore assets vendor cache (importmap)
        uses: actions/cache/restore@v4
        with:
          path: assets/vendor
          key: assets-vendor-${{ hashFiles('composer.lock') }}-${{ hashFiles('package-lock.json') }}
          restore-keys: assets-vendor-

      - run: cp .env.test .env
      - run: composer install --no-progress --no-interaction --no-scripts
      - run: php bin/console importmap:install
      - run: chmod +x vendor/bin/*
      - name: Migrations (base de test)
        run: |
          php bin/console doctrine:database:create --if-not-exists --no-interaction
          php bin/console doctrine:migrations:migrate --no-interaction
      - run: composer run phpunit:functional

  test-js:
    name: "Tests JS (Vitest)"
    needs: [lint-js]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run test:js

  # ─── E2E ─────────────────────

  e2e:
    name: "Tests E2E (Cypress)"
    needs: [lint-php, lint-js, lint-twig]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: carte_blanche
          POSTGRES_PASSWORD: carte_blanche
          POSTGRES_DB: carte_blanche_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: amqp, intl, pdo_pgsql

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Restore Cypress cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ hashFiles('package-lock.json') }}
          restore-keys: cypress-

      - name: Restore Composer cache
        uses: actions/cache/restore@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Restore assets vendor cache (importmap)
        uses: actions/cache/restore@v4
        with:
          path: assets/vendor
          key: assets-vendor-${{ hashFiles('composer.lock') }}-${{ hashFiles('package-lock.json') }}
          restore-keys: assets-vendor-

      - run: npm ci
      - run: cp .env.test .env
      - run: composer install --no-progress --no-interaction --no-scripts
      - run: php bin/console importmap:install

      - name: Tailwind build
        run: php bin/console tailwind:build

      - name: Compile asset map
        run: php bin/console asset-map:compile

      - name: Setup database
        run: |
          php bin/console doctrine:database:create --if-not-exists --no-interaction
          php bin/console doctrine:migrations:migrate --no-interaction

      - name: Demarrer le serveur
        run: |
          php -S 127.0.0.1:8888 -t public > /dev/null 2>&1 &
          sleep 3

      - name: Cypress
        run: npx cypress run

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots/

  # ─── BUILD (main) ────────────────

  build:
    name: "Build production"
    if: github.ref == 'refs/heads/main'
    needs: [unit-tests, functional-tests, e2e, test-js, lint-mcp]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: amqp, intl, pdo_pgsql
          tools: composer:v2

      - name: Restore Composer cache
        uses: actions/cache/restore@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - run: composer install --no-progress --no-interaction --no-dev --optimize-autoloader --no-scripts

      # ── POINT 2 : .env.prod minimal pour que cache:warmup ne plante pas ──
      - name: Créer .env.prod minimal pour le build
        run: |
          cat > .env.prod << 'EOF'
          APP_SECRET=buildsecret_placeholder
          DATABASE_URL=postgresql://x:x@localhost/x
          REDIS_URL=redis://localhost:6379
          MESSENGER_TRANSPORT_DSN=doctrine://default
          MAILER_DSN=null://null
          STRIPE_PUBLIC_KEY=pk_test_placeholder
          STRIPE_SECRET_KEY=sk_test_placeholder
          STRIPE_WEBHOOK_SECRET=whsec_placeholder
          MAPBOX_TOKEN=placeholder
          GOOGLE_MAPS_API_KEY=placeholder
          OAUTH_GOOGLE_CLIENT_ID=placeholder
          OAUTH_GOOGLE_CLIENT_SECRET=placeholder
          OAUTH_GITHUB_CLIENT_ID=placeholder
          OAUTH_GITHUB_CLIENT_SECRET=placeholder
          OLLAMA_URL=http://localhost:11434/
          OLLAMA_BASE_URL=http://localhost:11434
          OLLAMA_MODEL=content-generator
          OLLAMA_CHATBOT_MODEL=chatbot
          OLLAMA_RECOMMEND_MODEL=recommendation-explainer
          EOF

      - run: php bin/console cache:warmup --env=prod --no-debug

      - run: echo "Build prod OK ✅"

  # ─── DEPLOY (main uniquement) ────────────────

  deploy:
    name: "Deploy → Railway"
    if: github.ref == 'refs/heads/main'
    needs: [build]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy sur Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Migrations en prod
        run: railway run php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Cache clear prod
        run: railway run php bin/console cache:clear --env=prod --no-debug
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}